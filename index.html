<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotating Circle</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="container">
      <div class="circle-side"></div>
      <div class="circle circle--front">
        <div class="circle__side circle__side--front"></div>
        <div class="circle__side circle__side--back"></div>
      </div>
      <div class="circle circle--back">
        <div class="circle__side circle__side--front"></div>
        <div class="circle__side circle__side--back"></div>
      </div>
    </div>
  </body>
</html>
